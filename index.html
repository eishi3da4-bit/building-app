<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>建物歴史ガイド</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1rem; }
    .screen { background: white; border-radius: 16px; overflow: hidden; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .topbar { padding: 14px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; background: white; }
    .topbar-icon { width: 30px; height: 30px; border-radius: 8px; background: #0F6E56; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .topbar-icon svg { width: 17px; height: 17px; fill: white; }
    .topbar-title { font-size: 15px; font-weight: 600; color: #111; }
    .topbar-sub { font-size: 12px; color: #999; margin-left: auto; }
    .preview-area { position: relative; width: 100%; background: #f7f7f5; min-height: 220px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .preview-area img { width: 100%; max-height: 300px; object-fit: cover; display: block; }
    .preview-placeholder { text-align: center; padding: 2.5rem 1rem; }
    .preview-placeholder svg { display: block; margin: 0 auto 12px; opacity: 0.3; }
    .preview-placeholder p { font-size: 14px; color: #888; }
    .preview-placeholder span { font-size: 12px; color: #aaa; margin-top: 4px; display: block; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; border-top: 1px solid #eee; background: white; }
    .action-btn { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 13px 0; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; background: white; color: #333; -webkit-tap-highlight-color: transparent; }
    .action-btn:active { background: #f5f5f5; }
    .action-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .analyze-wrap { padding: 0 12px 12px; background: white; }
    .analyze-full { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 15px 0; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; background: #0F6E56; color: white; -webkit-tap-highlight-color: transparent; }
    .analyze-full:active { background: #085041; }
    .analyze-full:disabled { opacity: 0.4; }
    .analyze-full svg { width: 17px; height: 17px; }
    .result-area { margin: 0 12px 12px; }
    .result-card { background: #f7f7f5; border-radius: 12px; padding: 1rem; }
    .result-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
    .result-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; }
    .result-text { font-size: 14px; color: #222; line-height: 1.8; }
    .loading-wrap { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 1.25rem 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; animation: pulse 1.3s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,60%,100%{transform:scale(1);opacity:0.5} 30%{transform:scale(1.3);opacity:1} }
    .hint { font-size: 12px; color: #aaa; text-align: center; padding: 12px 0 0; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <span class="topbar-title">建物歴史ガイド</span>
      <span class="topbar-sub">AI 解説</span>
    </div>

    <input type="file" id="fileGallery" accept="image/*">
    <input type="file" id="fileCamera" accept="image/*" capture="environment">

    <div class="preview-area" id="previewArea">
      <div class="preview-placeholder" id="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <p>建物の写真を撮るか選んでください</p>
        <span>神社・お城・駅・海外の建物など</span>
      </div>
      <img id="previewImg" style="display:none" alt="preview">
    </div>

    <div class="action-row">
      <button class="action-btn" id="cameraBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        カメラで撮影
      </button>
      <button class="action-btn" id="galleryBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        写真を選ぶ
      </button>
    </div>

    <div class="analyze-wrap">
      <button class="analyze-full" id="analyzeBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        この建物の歴史を解説する
      </button>
    </div>

    <div class="result-area" id="resultArea" style="display:none"></div>
  </div>
  <p class="hint">Claude Vision API を使用</p>

  <script>
    const fileGallery = document.getElementById('fileGallery');
    const fileCamera = document.getElementById('fileCamera');
    const galleryBtn = document.getElementById('galleryBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const previewImg = document.getElementById('previewImg');
    const placeholder = document.getElementById('placeholder');
    const resultArea = document.getElementById('resultArea');

    let imageBase64 = null;
    let imageMime = 'image/jpeg';

    galleryBtn.addEventListener('click', () => fileGallery.click());
    cameraBtn.addEventListener('click', () => fileCamera.click());

    function handleFile(file) {
      if (!file) return;
      imageMime = file.type || 'image/jpeg';
      const reader = new FileReader();
      reader.onload = (ev) => {
        imageBase64 = ev.target.result.split(',')[1];
        previewImg.src = ev.target.result;
        previewImg.style.display = 'block';
        placeholder.style.display = 'none';
        analyzeBtn.disabled = false;
        resultArea.style.display = 'none';
        resultArea.innerHTML = '';
      };
      reader.readAsDataURL(file);
    }

    fileGallery.addEventListener('change', e => handleFile(e.target.files[0]));
    fileCamera.addEventListener('change', e => handleFile(e.target.files[0]));

    analyzeBtn.addEventListener('click', async () => {
      if (!imageBase64) return;
      resultArea.style.display = 'block';
      resultArea.innerHTML = '<div class="result-card"><div class="loading-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
      analyzeBtn.disabled = true;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { "Content-Type": "application/json", "x-api-key": "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", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
                { type: 'text', text: 'この建物の写真を見て、以下を日本語で解説してください。\n・建物の名前（わかる場合）\n・建設年・時代背景\n・建築様式の特徴\n・面白いエピソードや豆知識\n合計200〜300字程度でまとめてください。建物が特定できない場合は、見た目から推測できる情報を教えてください。' }
              ]
            }]
          })
        });
        const data = await res.json();
        const text = data.content?.map(b => b.text || '').join('') || '解析できませんでした。';
        resultArea.innerHTML = '<div class="result-card"><div class="result-label"><div class="result-dot"></div>AI 歴史解説</div><div class="result-text">' + text.replace(/\n/g, '<br>') + '</div></div>';
      } catch(e) {
        resultArea.innerHTML = '<div class="result-card"><div class="result-text" style="color:#c00">エラーが発生しました。もう一度お試しください。</div></div>';
      }

      analyzeBtn.disabled = false;
      analyzeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:17px;height:17px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> この建物の歴史を解説する';
    });
  </script>
</body>
</html>
